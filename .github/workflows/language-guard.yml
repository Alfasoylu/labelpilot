name: Language Guard (German only)

on:
  push:
  pull_request:

jobs:
  german-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check for Turkish in customer-facing files
        run: node scripts/check-language.mjs
